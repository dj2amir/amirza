<VirtualHost *:80>
    ServerName ${DOMAIN}
    DocumentRoot /var/www/html/mirzabotconfig
    
    <Directory /var/www/html/mirzabotconfig>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Security: Block sensitive files
    <FilesMatch "\.(txt|json|sql|zip|log)$">
        Require all denied
    </FilesMatch>

    # PHP-FPM settings (not used with mod_php, but good practice)
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/mirzabot-error.log
    CustomLog ${APACHE_LOG_DIR}/mirzabot-access.log combined

    # Enable compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css application/javascript application/json
    </IfModule>

    # Browser caching
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
    </IfModule>
</VirtualHost>
